<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos · Romina Cárdenas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Inter',sans-serif;
  background:#030712;
  color:#fff;
  overflow-x:hidden;
}

.proyectos-page{
  min-height:100vh;
  padding:28px 6% 70px;
  background:
    radial-gradient(circle at 20% 18%, rgba(124,58,237,.34), transparent 34%),
    radial-gradient(circle at 75% 35%, rgba(167,16,118,.14), transparent 34%),
    linear-gradient(135deg, #030712 0%, #080411 45%, #030712 100%);
}

/* NAV */
.nav{
  max-width:1280px;
  margin:0 auto;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:34px;
}
.nav-links{display:flex;gap:32px;align-items:center;}
.nav-links a{
  color:#fff;
  text-decoration:none;
  font-size:13px;
  font-weight:600;
  transition:.3s;
}
.nav-links a:hover,
.nav-links a.active{color:#b98aff;}

.btn-contacto{
  color:#fff;
  text-decoration:none;
  border:1px solid #9b6cff;
  border-radius:16px;
  padding:12px 26px;
  font-size:13px;
  font-weight:600;
}

/* HEADER */
.proyectos-header{max-width:1280px;margin:80px auto 46px;}

.badge{
  display:inline-flex;
  padding:8px 16px;
  border-radius:999px;
  border
